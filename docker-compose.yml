services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hse_dev}
      POSTGRES_DB: ${POSTGRES_DB:-holysmokesengraving}
    ports:
      - '5433:5433'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: